[paths]
models_dir = "experiments/lorenz/models"
eval_dir = "experiments/lorenz/evaluation"
loss_dir = "experiments/lorenz/training_results"
analysis_dir = "experiments/lorenz/analysis"

[training]
device = "cpu"
max_T = 10
epochs = 100
batch_size = 64
optimizer = "adam"
learning_rate = 3e-4
weight_decay = 1e-2
num_seeds = 10
num_trajectories = 100
steps_per_trajectory = 1000
dt = 0.08
default_adaptive_horizon = 0.48
rho = 1.0
temperature = 0.25
weight_floor = 0.05
anchor_alpha = 0.25

[model]
input_dim = 3
layer_width = 10
window_size = 5
