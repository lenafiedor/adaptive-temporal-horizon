[paths]
models_dir = "experiments/lorenz/models"
eval_dir = "experiments/lorenz/evaluation"
loss_dir = "experiments/lorenz/training_results"
analysis_dir = "experiments/lorenz/analysis"
data_dir = "experiments/lorenz/data"

[training]
default_system = "lorenz"
device = "cpu"
max_train_T = 10
epochs = 100
batch_size = 64
optimizer = "adam"
learning_rate = 3e-4
weight_decay = 1e-2
num_seeds = 10
trajectory_steps = 120000
random_seed = 12345
train_fraction = 0.8
dt = 0.08
burn_in_time = 10.0
variance = 1
default_adaptive_horizon = 0.4

[weighted-loss]
rho = 1.0
temperature = 0.25
weight_floor = 0.05
anchor_alpha = 0.25
ftle_window = 5

[model]
layer_width = 10

[evaluation]
simulation_steps = 50000
num_batches = 50
max_eval_T = 10
